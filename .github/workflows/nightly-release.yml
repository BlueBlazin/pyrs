name: nightly-release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CPYTHON_STDLIB_VERSION: "3.14.3"
  CPYTHON_STDLIB_RELEASE_PAGE: "https://www.python.org/downloads/release/python-3143/"
  CPYTHON_STDLIB_SOURCE_URL: "https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz"
  CPYTHON_STDLIB_SOURCE_SHA256: "d7fe130d0501ae047ca318fa92aa642603ab6f217901015a1df6ce650d5470cd"

jobs:
  build-binaries:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: pyrs-nightly-x86_64-unknown-linux-gnu.tar.gz
            binary_name: pyrs
          - os: macos-14
            target: x86_64-apple-darwin
            archive_name: pyrs-nightly-x86_64-apple-darwin.tar.gz
            binary_name: pyrs
          - os: macos-14
            target: aarch64-apple-darwin
            archive_name: pyrs-nightly-aarch64-apple-darwin.tar.gz
            binary_name: pyrs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux native build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libbz2-dev liblzma-dev

      - name: Build release binary
        run: cargo build --release --locked --bin pyrs --target ${{ matrix.target }}

      - name: Package archive
        id: package_unix
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          chmod +x dist/${{ matrix.binary_name }}
          tar -C dist -czf ${{ matrix.archive_name }} ${{ matrix.binary_name }}
          echo "archive=${{ matrix.archive_name }}" >> "$GITHUB_OUTPUT"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.target }}
          path: ${{ steps.package_unix.outputs.archive }}
          if-no-files-found: error


  publish-nightly-container:
    name: publish-nightly-container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/blueblazin/pyrs
          tags: |
            type=raw,value=nightly
            type=sha,format=short,prefix=nightly-

      - name: Build and push nightly image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          pull: true
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  publish-nightly-release:
    name: publish-nightly
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-*
          path: dist
          merge-multiple: true

      - name: Build CPython stdlib bundle (official source)
        run: |
          python3 scripts/build_cpython_stdlib_pack.py \
            --cpython-version "${CPYTHON_STDLIB_VERSION}" \
            --release-page-url "${CPYTHON_STDLIB_RELEASE_PAGE}" \
            --source-url "${CPYTHON_STDLIB_SOURCE_URL}" \
            --source-sha256 "${CPYTHON_STDLIB_SOURCE_SHA256}" \
            --out "dist/pyrs-stdlib-cpython-${CPYTHON_STDLIB_VERSION}.tar.gz"

      - name: Generate SHA256SUMS
        run: |
          cd dist
          shasum -a 256 * > SHA256SUMS

      - name: Move nightly tag to current commit
        env:
          NIGHTLY_TAG_TOKEN: ${{ secrets.NIGHTLY_TAG_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          token="${NIGHTLY_TAG_TOKEN:-$GITHUB_TOKEN}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly "${GITHUB_SHA}"
          if ! git push "https://x-access-token:${token}@github.com/${GITHUB_REPOSITORY}.git" refs/tags/nightly --force; then
            if [ -n "${NIGHTLY_TAG_TOKEN:-}" ] && [ "${token}" != "${GITHUB_TOKEN}" ]; then
              echo "nightly tag push failed with NIGHTLY_TAG_TOKEN; retrying with GITHUB_TOKEN"
              git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" refs/tags/nightly --force
            else
              echo "nightly tag push failed; set NIGHTLY_TAG_TOKEN (repo-scoped token with contents:write) if GITHUB_TOKEN is restricted"
              exit 1
            fi
          fi

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          target_commitish: ${{ github.sha }}
          name: pyrs nightly
          prerelease: true
          make_latest: false
          overwrite_files: true
          body: |
            Rolling nightly build from `${{ github.sha }}`.
          files: |
            dist/*
