name: nightly-release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: pyrs-nightly-x86_64-unknown-linux-gnu.tar.gz
            binary_name: pyrs
          - os: macos-13
            target: x86_64-apple-darwin
            archive_name: pyrs-nightly-x86_64-apple-darwin.tar.gz
            binary_name: pyrs
          - os: macos-14
            target: aarch64-apple-darwin
            archive_name: pyrs-nightly-aarch64-apple-darwin.tar.gz
            binary_name: pyrs
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: pyrs-nightly-x86_64-pc-windows-msvc.zip
            binary_name: pyrs.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --bin pyrs --target ${{ matrix.target }}

      - name: Package archive (unix)
        if: runner.os != 'Windows'
        id: package_unix
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          chmod +x dist/${{ matrix.binary_name }}
          tar -C dist -czf ${{ matrix.archive_name }} ${{ matrix.binary_name }}
          echo "archive=${{ matrix.archive_name }}" >> "$GITHUB_OUTPUT"

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        id: package_windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target\\${{ matrix.target }}\\release\\${{ matrix.binary_name }}" "dist\\${{ matrix.binary_name }}"
          Compress-Archive -Path "dist\\${{ matrix.binary_name }}" -DestinationPath "${{ matrix.archive_name }}" -Force
          "archive=${{ matrix.archive_name }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.target }}
          path: ${{ steps.package_unix.outputs.archive || steps.package_windows.outputs.archive }}
          if-no-files-found: error


  publish-nightly-container:
    name: publish-nightly-container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/blueblazin/pyrs
          tags: |
            type=raw,value=nightly
            type=sha,format=short,prefix=nightly-

      - name: Build and push nightly image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  publish-nightly-release:
    name: publish-nightly
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-*
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          shasum -a 256 * > SHA256SUMS

      - name: Move nightly tag to current commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method PATCH \
            /repos/${GITHUB_REPOSITORY}/git/refs/tags/nightly \
            -f sha=${GITHUB_SHA} \
            -f force=true \
          || gh api \
            --method POST \
            /repos/${GITHUB_REPOSITORY}/git/refs \
            -f ref=refs/tags/nightly \
            -f sha=${GITHUB_SHA}

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          target_commitish: ${{ github.sha }}
          name: pyrs nightly
          prerelease: true
          make_latest: false
          overwrite_files: true
          body: |
            Rolling nightly build from `${{ github.sha }}`.
          files: |
            dist/*
