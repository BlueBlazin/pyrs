name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: pyrs
          - os: macos-13
            target: x86_64-apple-darwin
            binary_name: pyrs
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: pyrs
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: pyrs.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --bin pyrs --target ${{ matrix.target }}

      - name: Package archive (unix)
        if: runner.os != 'Windows'
        id: package_unix
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          chmod +x dist/${{ matrix.binary_name }}
          archive="pyrs-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          tar -C dist -czf "$archive" ${{ matrix.binary_name }}
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        id: package_windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target\\${{ matrix.target }}\\release\\${{ matrix.binary_name }}" "dist\\${{ matrix.binary_name }}"
          $archive = "pyrs-$env:GITHUB_REF_NAME-${{ matrix.target }}.zip"
          Compress-Archive -Path "dist\\${{ matrix.binary_name }}" -DestinationPath $archive -Force
          "archive=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ steps.package_unix.outputs.archive || steps.package_windows.outputs.archive }}
          if-no-files-found: error

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          shasum -a 256 * > SHA256SUMS

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: pyrs ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/*

  publish-release-container:
    name: publish-release-container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/blueblazin/pyrs
          tags: |
            type=ref,event=tag
            type=raw,value=beta,enable=${{ contains(github.ref_name, 'beta') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
