name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CPYTHON_STDLIB_VERSION: "3.14.3"
  CPYTHON_STDLIB_RELEASE_PAGE: "https://www.python.org/downloads/release/python-3143/"
  CPYTHON_STDLIB_SOURCE_URL: "https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz"
  CPYTHON_STDLIB_SOURCE_SHA256: "d7fe130d0501ae047ca318fa92aa642603ab6f217901015a1df6ce650d5470cd"

jobs:
  build-binaries:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: pyrs
          - os: macos-14
            target: x86_64-apple-darwin
            binary_name: pyrs
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: pyrs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux native build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libbz2-dev liblzma-dev

      - name: Build release binary
        run: cargo build --release --locked --bin pyrs --target ${{ matrix.target }}

      - name: Package archive
        id: package_unix
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          chmod +x dist/${{ matrix.binary_name }}
          archive="pyrs-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          tar -C dist -czf "$archive" ${{ matrix.binary_name }}
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ steps.package_unix.outputs.archive }}
          if-no-files-found: error

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Build CPython stdlib bundle (official source)
        run: |
          python3 scripts/build_cpython_stdlib_pack.py \
            --cpython-version "${CPYTHON_STDLIB_VERSION}" \
            --release-page-url "${CPYTHON_STDLIB_RELEASE_PAGE}" \
            --source-url "${CPYTHON_STDLIB_SOURCE_URL}" \
            --source-sha256 "${CPYTHON_STDLIB_SOURCE_SHA256}" \
            --out "dist/pyrs-stdlib-cpython-${CPYTHON_STDLIB_VERSION}.tar.gz"

      - name: Generate SHA256SUMS
        run: |
          cd dist
          shasum -a 256 * > SHA256SUMS

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: pyrs ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/*

  publish-release-container:
    name: publish-release-container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/blueblazin/pyrs
          tags: |
            type=ref,event=tag
            type=raw,value=beta,enable=${{ contains(github.ref_name, 'beta') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          pull: true
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-homebrew-tap:
    name: update-homebrew-tap
    runs-on: ubuntu-latest
    needs: publish-release
    env:
      HOMEBREW_TAP_REPO: BlueBlazin/homebrew-tap
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      CPYTHON_STDLIB_VERSION: ${{ env.CPYTHON_STDLIB_VERSION }}
      CPYTHON_STDLIB_SOURCE_URL: ${{ env.CPYTHON_STDLIB_SOURCE_URL }}
      CPYTHON_STDLIB_SOURCE_SHA256: ${{ env.CPYTHON_STDLIB_SOURCE_SHA256 }}

    steps:
      - name: Skip when Homebrew tap token is not configured
        if: ${{ env.HOMEBREW_TAP_TOKEN == '' }}
        run: echo "HOMEBREW_TAP_TOKEN not configured; skipping tap update."

      - name: Configure git identity
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone Homebrew tap repository
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" tap

      - name: Compute source tarball checksum
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          source_url="https://github.com/BlueBlazin/pyrs/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          curl -fsSL -o /tmp/pyrs-src.tar.gz "$source_url"
          source_sha="$(shasum -a 256 /tmp/pyrs-src.tar.gz | awk '{print $1}')"
          echo "HOMEBREW_SOURCE_URL=${source_url}" >> "$GITHUB_ENV"
          echo "HOMEBREW_SOURCE_SHA=${source_sha}" >> "$GITHUB_ENV"

      - name: Update Formula/pyrs.rb
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          mkdir -p tap/Formula
          cat > tap/Formula/pyrs.rb <<EOF
          class Pyrs < Formula
            desc "Python interpreter in Rust targeting CPython 3.14 compatibility"
            homepage "https://github.com/BlueBlazin/pyrs"
            url "${HOMEBREW_SOURCE_URL}"
            sha256 "${HOMEBREW_SOURCE_SHA}"

            depends_on "rust" => :build

            resource "cpython-stdlib-${CPYTHON_STDLIB_VERSION}" do
              url "${CPYTHON_STDLIB_SOURCE_URL}"
              sha256 "${CPYTHON_STDLIB_SOURCE_SHA256}"
            end

            def install
              system "cargo", "install", *std_cargo_args(path: "."), "--locked"
              (share/"pyrs/stdlib/${CPYTHON_STDLIB_VERSION}").mkpath
              resource("cpython-stdlib-${CPYTHON_STDLIB_VERSION}").stage do
                cp_r "Lib", share/"pyrs/stdlib/${CPYTHON_STDLIB_VERSION}/Lib"
                cp "LICENSE", share/"pyrs/stdlib/${CPYTHON_STDLIB_VERSION}/LICENSE"
              end
            end

            test do
              assert_match "pyrs", shell_output("#{bin}/pyrs --version")
              assert_equal "ok\n", shell_output("#{bin}/pyrs -c 'import json; print(\"ok\")'")
            end
          end
          EOF

      - name: Commit and push formula update
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          cd tap
          if git diff --quiet -- Formula/pyrs.rb; then
            echo "Formula already up to date"
            exit 0
          fi
          git add Formula/pyrs.rb
          git commit -m "pyrs ${GITHUB_REF_NAME}"
          git push origin HEAD:main
