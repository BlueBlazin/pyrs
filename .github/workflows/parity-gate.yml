name: parity-gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libbz2-dev liblzma-dev

      - name: Download CPython 3.14.3 Lib
        run: |
          curl -fsSL -o /tmp/Python-3.14.3.tgz https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz
          tar -xzf /tmp/Python-3.14.3.tgz -C /tmp
          echo "PYRS_CPYTHON_LIB=/tmp/Python-3.14.3/Lib" >> "$GITHUB_ENV"

      - name: Verify generated Unicode-name table
        run: |
          python scripts/generate_unicode_name_table.py \
            --check \
            --cpython-src /tmp/Python-3.14.3 \
            --output src/parser/unicode_names_data.txt

      - name: Verify C-API no-op inventory drift
        run: python3 scripts/check_capi_noop_inventory.py --manifest perf/capi_noop_inventory.json

      - name: Audit scaffolding drift
        run: python3 scripts/audit_scaffolding.py

      - name: Build debug pyrs binary (language feature gate)
        run: cargo build -q --bin pyrs

      - name: Validate source-language feature manifest
        run: |
          python3 scripts/check_language_feature_manifest.py \
            --pyrs target/debug/pyrs \
            --cpython-bin python3 \
            --manifest docs/LANGUAGE_FEATURE_MANIFEST.json \
            --out perf/language_feature_manifest_latest.json

      - name: Validate source-language feature inventory coverage
        run: |
          python3 scripts/check_language_feature_coverage.py \
            --inventory docs/LANGUAGE_FEATURE_INVENTORY.json \
            --probe-results perf/language_feature_manifest_latest.json \
            --probe-map docs/LANGUAGE_FEATURE_PROBE_MAP.json \
            --out perf/language_feature_coverage_latest.json \
            --enforce \
            --min-coverage-percent 100 \
            --max-probe-fanout 90

      - name: Upload language feature manifest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: language-feature-manifest
          path: perf/language_feature_manifest_latest.json
          if-no-files-found: ignore

      - name: Upload language feature coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: language-feature-coverage
          path: perf/language_feature_coverage_latest.json
          if-no-files-found: ignore

      - name: Upload C-API no-op inventory artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capi-noop-inventory
          path: perf/capi_noop_inventory.json
          if-no-files-found: ignore

  install-smoke:
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        run: |
          if ! command -v cargo-nextest >/dev/null 2>&1; then
            cargo install cargo-nextest --locked
          fi

      - name: Install Linux native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libbz2-dev liblzma-dev

      - name: Install pyrs from local path
        run: cargo install --path . --locked --root /tmp/pyrs-install-smoke

      - name: Verify installed CLI version
        run: /tmp/pyrs-install-smoke/bin/pyrs --version

      - name: Verify installed CLI execution
        run: /tmp/pyrs-install-smoke/bin/pyrs -c "print(40 + 2)"

  full-test-suite:
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libbz2-dev liblzma-dev

      - name: Download CPython 3.14.3 Lib
        run: |
          curl -fsSL -o /tmp/Python-3.14.3.tgz https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz
          tar -xzf /tmp/Python-3.14.3.tgz -C /tmp
          echo "PYRS_CPYTHON_LIB=/tmp/Python-3.14.3/Lib" >> "$GITHUB_ENV"

      - name: Run full test suite
        run: cargo nextest run --status-level fail --final-status-level fail

  parity-profile:
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        run: |
          if ! command -v cargo-nextest >/dev/null 2>&1; then
            cargo install cargo-nextest --locked
          fi

      - name: Install Linux native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libbz2-dev liblzma-dev

      - name: Download CPython 3.14.3 Lib
        run: |
          curl -fsSL -o /tmp/Python-3.14.3.tgz https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz
          tar -xzf /tmp/Python-3.14.3.tgz -C /tmp
          echo "PYRS_CPYTHON_LIB=/tmp/Python-3.14.3/Lib" >> "$GITHUB_ENV"

      - name: Run parity gate profile
        env:
          PYRS_CPYTHON_BIN: python3
        run: ./scripts/run_parity_gate.sh

      - name: Upload builtin parity artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: builtin-parity-report
          path: perf/builtin_parity_report.json
          if-no-files-found: ignore

  coverage-gate:
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libbz2-dev liblzma-dev

      - name: Install cargo-llvm-cov
        run: |
          if ! command -v cargo-llvm-cov >/dev/null 2>&1; then
            cargo install cargo-llvm-cov --locked
          fi

      - name: Download CPython 3.14.3 Lib
        run: |
          curl -fsSL -o /tmp/Python-3.14.3.tgz https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz
          tar -xzf /tmp/Python-3.14.3.tgz -C /tmp
          echo "PYRS_CPYTHON_LIB=/tmp/Python-3.14.3/Lib" >> "$GITHUB_ENV"

      - name: Run coverage gate (policy ratchet)
        env:
          PYRS_COVERAGE_ENFORCE: "1"
          PYRS_COVERAGE_POLICY_FILE: docs/COVERAGE_GATE_POLICY.json
        run: ./scripts/run_coverage_gate.sh

  bundled-stdlib-smoke:
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libbz2-dev liblzma-dev

      - name: Build debug pyrs binary
        run: cargo build -q --bin pyrs

      - name: Verify host CPython 3.14 stdlib roots are absent
        run: |
          for root in \
            /Library/Frameworks/Python.framework/Versions/3.14/lib/python3.14 \
            /opt/homebrew/Frameworks/Python.framework/Versions/3.14/lib/python3.14 \
            /usr/local/lib/python3.14 \
            /usr/lib/python3.14; do
            if [ -d "$root" ]; then
              echo "unexpected host CPython 3.14 stdlib root present: $root" >&2
              exit 1
            fi
          done

      - name: Build CPython stdlib bundle (official source)
        run: |
          python3 scripts/build_cpython_stdlib_pack.py \
            --cpython-version 3.14.3 \
            --release-page-url https://www.python.org/downloads/release/python-3143/ \
            --source-url https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz \
            --source-sha256 d7fe130d0501ae047ca318fa92aa642603ab6f217901015a1df6ce650d5470cd \
            --out /tmp/pyrs-stdlib-cpython-3.14.3.tar.gz

      - name: Stage bundled stdlib in isolated user data root
        run: |
          rm -rf /tmp/pyrs-stdlib-smoke
          mkdir -p /tmp/pyrs-stdlib-smoke/extract
          tar -xzf /tmp/pyrs-stdlib-cpython-3.14.3.tar.gz -C /tmp/pyrs-stdlib-smoke/extract
          mkdir -p /tmp/pyrs-stdlib-smoke/xdg/pyrs/stdlib/3.14.3
          cp -R \
            /tmp/pyrs-stdlib-smoke/extract/pyrs-stdlib-cpython-3.14.3/Lib \
            /tmp/pyrs-stdlib-smoke/xdg/pyrs/stdlib/3.14.3/Lib

      - name: Smoke test bundled stdlib import path
        run: |
          mkdir -p /tmp/pyrs-stdlib-smoke/home
          export HOME=/tmp/pyrs-stdlib-smoke/home
          export XDG_DATA_HOME=/tmp/pyrs-stdlib-smoke/xdg
          unset PYRS_CPYTHON_LIB
          unset PYTHONHOME
          unset PYTHONPATH
          target/debug/pyrs -c "import json, os, sys; bundle=os.path.join(os.environ['XDG_DATA_HOME'],'pyrs','stdlib','3.14.3','Lib'); assert bundle in sys.path, sys.path; jf=getattr(json,'__file__',''); assert jf.startswith(bundle), jf; print('bundled-stdlib-smoke-ok')"

  numpy-probes:
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libbz2-dev liblzma-dev

      - name: Download CPython 3.14.3 Lib
        run: |
          curl -fsSL -o /tmp/Python-3.14.3.tgz https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz
          tar -xzf /tmp/Python-3.14.3.tgz -C /tmp
          echo "PYRS_CPYTHON_LIB=/tmp/Python-3.14.3/Lib" >> "$GITHUB_ENV"

      - name: Build debug pyrs binary
        run: cargo build -q --bin pyrs

      - name: NumPy bring-up probe (non-blocking)
        continue-on-error: true
        run: |
          python3 scripts/probe_numpy_gate.py \
            --pyrs target/debug/pyrs \
            --cpython-lib "$PYRS_CPYTHON_LIB" \
            --out perf/numpy_gate_latest.json \
            --timeout 20

      - name: NumPy source-build bring-up probe (non-blocking)
        continue-on-error: true
        run: |
          python3 scripts/probe_numpy_gate.py \
            --pyrs target/debug/pyrs \
            --cpython-lib "$PYRS_CPYTHON_LIB" \
            --numpy-src "${PYRS_NUMPY_SRC:-/tmp/pyrs_numpy_source_not_configured}" \
            --out perf/numpy_gate_source_build_latest.json \
            --timeout 20

      - name: Install NumPy wheel for direct probe (non-blocking)
        continue-on-error: true
        run: python3 -m pip install -q "numpy==2.4.2"

      - name: NumPy direct-mode probe (non-blocking)
        continue-on-error: true
        run: |
          python3 scripts/probe_numpy_gate.py \
            --pyrs target/debug/pyrs \
            --cpython-lib "$PYRS_CPYTHON_LIB" \
            --probe-local-numpy \
            --python-probe-bin python3 \
            --out perf/numpy_gate_direct_latest.json \
            --timeout 20

      - name: Upload NumPy bring-up artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: numpy-bringup-gate
          path: perf/numpy_gate_latest.json
          if-no-files-found: ignore

      - name: Upload NumPy source-build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: numpy-source-build-gate
          path: perf/numpy_gate_source_build_latest.json
          if-no-files-found: ignore

      - name: Upload NumPy direct-mode artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: numpy-direct-gate
          path: perf/numpy_gate_direct_latest.json
          if-no-files-found: ignore

  native-perf-smoke:
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libbz2-dev liblzma-dev

      - name: Build release pyrs binary
        run: cargo build -q --release --bin pyrs

      - name: Run native performance smoke gate
        run: |
          python3 scripts/perf_smoke_native.py \
            --pyrs target/release/pyrs \
            --python-bin python3 \
            --fib-n 36 \
            --warmup 1 \
            --iterations 3 \
            --max-pyrs-seconds 12 \
            --max-pyrs-vs-python-ratio 8 \
            --out perf/native_perf_smoke_latest.json

      - name: Upload native perf smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-perf-smoke
          path: perf/native_perf_smoke_latest.json
          if-no-files-found: ignore

  dispatch-hotpath-benchmark:
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libbz2-dev liblzma-dev

      - name: Dispatch hotpath benchmark smoke (non-blocking)
        run: ./scripts/bench_dispatch_hotpath.sh 5

      - name: Upload dispatch benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dispatch-hotpath-bench
          path: perf/dispatch_hotpath_bench.txt
          if-no-files-found: ignore

  sanitizer-stability:
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly + rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libbz2-dev liblzma-dev

      - name: Download CPython 3.14.3 Lib
        run: |
          curl -fsSL -o /tmp/Python-3.14.3.tgz https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz
          tar -xzf /tmp/Python-3.14.3.tgz -C /tmp
          echo "PYRS_CPYTHON_LIB=/tmp/Python-3.14.3/Lib" >> "$GITHUB_ENV"

      - name: Install NumPy wheel
        run: python3 -m pip install -q "numpy==2.4.2"

      - name: Resolve NumPy site-packages path
        run: |
          SITE_PACKAGES=$(python3 -c "import site; print(site.getsitepackages()[0])")
          echo "PYRS_NUMPY_SITE_PACKAGES=${SITE_PACKAGES}" >> "$GITHUB_ENV"

      - name: ASan NumPy lifetime stress
        env:
          RUSTFLAGS: "-Zsanitizer=address"
          ASAN_OPTIONS: "detect_leaks=0:halt_on_error=1:abort_on_error=1"
        run: |
          cargo +nightly test -q \
            -Zbuild-std \
            --target x86_64-unknown-linux-gnu \
            --test vm \
            numpy_axis_sum_and_repr_stress_stays_stable \
            -- --exact

      - name: ASan extension vectorcall smoke
        env:
          RUSTFLAGS: "-Zsanitizer=address"
          ASAN_OPTIONS: "detect_leaks=0:halt_on_error=1:abort_on_error=1"
        run: |
          cargo +nightly test -q \
            -Zbuild-std \
            --target x86_64-unknown-linux-gnu \
            --test extension_smoke \
            cpython_vectorcall_decodes_non_numpy_foreign_object_args \
            -- --exact
