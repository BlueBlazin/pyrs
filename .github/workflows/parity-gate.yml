name: parity-gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Download CPython 3.14.3 Lib
        run: |
          curl -fsSL -o /tmp/Python-3.14.3.tgz https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz
          tar -xzf /tmp/Python-3.14.3.tgz -C /tmp
          echo "PYRS_CPYTHON_LIB=/tmp/Python-3.14.3/Lib" >> "$GITHUB_ENV"

      - name: Verify generated Unicode-name table
        run: |
          python scripts/generate_unicode_name_table.py \
            --check \
            --cpython-src /tmp/Python-3.14.3 \
            --output src/parser/unicode_names_data.txt

      - name: Verify C-API no-op inventory drift
        run: python3 scripts/check_capi_noop_inventory.py --manifest perf/capi_noop_inventory.json

      - name: Audit scaffolding drift
        run: python3 scripts/audit_scaffolding.py

      - name: Upload C-API no-op inventory artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capi-noop-inventory
          path: perf/capi_noop_inventory.json
          if-no-files-found: ignore

  full-test-suite:
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Download CPython 3.14.3 Lib
        run: |
          curl -fsSL -o /tmp/Python-3.14.3.tgz https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz
          tar -xzf /tmp/Python-3.14.3.tgz -C /tmp
          echo "PYRS_CPYTHON_LIB=/tmp/Python-3.14.3/Lib" >> "$GITHUB_ENV"

      - name: Run full test suite
        run: cargo test -q

  parity-profile:
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Download CPython 3.14.3 Lib
        run: |
          curl -fsSL -o /tmp/Python-3.14.3.tgz https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz
          tar -xzf /tmp/Python-3.14.3.tgz -C /tmp
          echo "PYRS_CPYTHON_LIB=/tmp/Python-3.14.3/Lib" >> "$GITHUB_ENV"

      - name: Run parity gate profile
        env:
          PYRS_CPYTHON_BIN: python3
        run: ./scripts/run_parity_gate.sh

      - name: Upload builtin parity artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: builtin-parity-report
          path: perf/builtin_parity_report.json
          if-no-files-found: ignore

  coverage-gate:
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: |
          if ! command -v cargo-llvm-cov >/dev/null 2>&1; then
            cargo install cargo-llvm-cov --locked
          fi

      - name: Download CPython 3.14.3 Lib
        run: |
          curl -fsSL -o /tmp/Python-3.14.3.tgz https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz
          tar -xzf /tmp/Python-3.14.3.tgz -C /tmp
          echo "PYRS_CPYTHON_LIB=/tmp/Python-3.14.3/Lib" >> "$GITHUB_ENV"

      - name: Run coverage gate (enforced soft floors)
        env:
          PYRS_COVERAGE_ENFORCE: "1"
          PYRS_COVERAGE_MIN_REGIONS: "70"
          PYRS_COVERAGE_MIN_FUNCTIONS: "65"
          PYRS_COVERAGE_MIN_LINES: "70"
        run: ./scripts/run_coverage_gate.sh

  numpy-probes:
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Download CPython 3.14.3 Lib
        run: |
          curl -fsSL -o /tmp/Python-3.14.3.tgz https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz
          tar -xzf /tmp/Python-3.14.3.tgz -C /tmp
          echo "PYRS_CPYTHON_LIB=/tmp/Python-3.14.3/Lib" >> "$GITHUB_ENV"

      - name: Build debug pyrs binary
        run: cargo build -q --bin pyrs

      - name: NumPy bring-up probe (non-blocking)
        continue-on-error: true
        run: |
          python3 scripts/probe_numpy_gate.py \
            --pyrs target/debug/pyrs \
            --cpython-lib "$PYRS_CPYTHON_LIB" \
            --out perf/numpy_gate_latest.json \
            --timeout 20

      - name: NumPy source-build bring-up probe (non-blocking)
        continue-on-error: true
        run: |
          python3 scripts/probe_numpy_gate.py \
            --pyrs target/debug/pyrs \
            --cpython-lib "$PYRS_CPYTHON_LIB" \
            --numpy-src "${PYRS_NUMPY_SRC:-/tmp/pyrs_numpy_source_not_configured}" \
            --out perf/numpy_gate_source_build_latest.json \
            --timeout 20

      - name: Install NumPy wheel for direct probe (non-blocking)
        continue-on-error: true
        run: python3 -m pip install -q "numpy==2.4.2"

      - name: NumPy direct-mode probe (non-blocking)
        continue-on-error: true
        run: |
          python3 scripts/probe_numpy_gate.py \
            --pyrs target/debug/pyrs \
            --cpython-lib "$PYRS_CPYTHON_LIB" \
            --probe-local-numpy \
            --python-probe-bin python3 \
            --out perf/numpy_gate_direct_latest.json \
            --timeout 20

      - name: Upload NumPy bring-up artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: numpy-bringup-gate
          path: perf/numpy_gate_latest.json
          if-no-files-found: ignore

      - name: Upload NumPy source-build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: numpy-source-build-gate
          path: perf/numpy_gate_source_build_latest.json
          if-no-files-found: ignore

      - name: Upload NumPy direct-mode artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: numpy-direct-gate
          path: perf/numpy_gate_direct_latest.json
          if-no-files-found: ignore

  dispatch-hotpath-benchmark:
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Dispatch hotpath benchmark smoke (non-blocking)
        run: ./scripts/bench_dispatch_hotpath.sh 5

      - name: Upload dispatch benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dispatch-hotpath-bench
          path: perf/dispatch_hotpath_bench.txt
          if-no-files-found: ignore

  sanitizer-stability:
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly + rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Download CPython 3.14.3 Lib
        run: |
          curl -fsSL -o /tmp/Python-3.14.3.tgz https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz
          tar -xzf /tmp/Python-3.14.3.tgz -C /tmp
          echo "PYRS_CPYTHON_LIB=/tmp/Python-3.14.3/Lib" >> "$GITHUB_ENV"

      - name: Install NumPy wheel
        run: python3 -m pip install -q "numpy==2.4.2"

      - name: Resolve NumPy site-packages path
        run: |
          SITE_PACKAGES=$(python3 -c "import site; print(site.getsitepackages()[0])")
          echo "PYRS_NUMPY_SITE_PACKAGES=${SITE_PACKAGES}" >> "$GITHUB_ENV"

      - name: ASan NumPy lifetime stress
        env:
          RUSTFLAGS: "-Zsanitizer=address"
          ASAN_OPTIONS: "detect_leaks=0:halt_on_error=1:abort_on_error=1"
        run: |
          cargo +nightly test -q \
            -Zbuild-std \
            --target x86_64-unknown-linux-gnu \
            --test vm \
            numpy_axis_sum_and_repr_stress_stays_stable \
            -- --exact

      - name: ASan extension vectorcall smoke
        env:
          RUSTFLAGS: "-Zsanitizer=address"
          ASAN_OPTIONS: "detect_leaks=0:halt_on_error=1:abort_on_error=1"
        run: |
          cargo +nightly test -q \
            -Zbuild-std \
            --target x86_64-unknown-linux-gnu \
            --test extension_smoke \
            cpython_vectorcall_decodes_non_numpy_foreign_object_args \
            -- --exact
