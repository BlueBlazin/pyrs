name: parity-gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  parity:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Download CPython 3.14.3 Lib
        run: |
          curl -fsSL -o /tmp/Python-3.14.3.tgz https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz
          tar -xzf /tmp/Python-3.14.3.tgz -C /tmp
          echo "PYRS_CPYTHON_LIB=/tmp/Python-3.14.3/Lib" >> "$GITHUB_ENV"

      - name: Run full test suite
        run: cargo test -q

      - name: Run parity gate profile
        run: ./scripts/run_parity_gate.sh
