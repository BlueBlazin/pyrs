name: website-check

on:
  pull_request:
    paths:
      - "website/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/build_wasm_website_bundle.sh"
      - ".github/workflows/website-check.yml"
  push:
    branches:
      - master
    paths:
      - "website/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/build_wasm_website_bundle.sh"
      - ".github/workflows/website-check.yml"

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (wasm32)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Download CPython 3.14.3 Lib
        working-directory: .
        run: |
          curl -fsSL -o /tmp/Python-3.14.3.tgz https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz
          tar -xzf /tmp/Python-3.14.3.tgz -C /tmp
          echo "PYRS_CPYTHON_LIB=/tmp/Python-3.14.3/Lib" >> "$GITHUB_ENV"

      - name: Install wasm-pack
        working-directory: .
        run: |
          if ! command -v wasm-pack >/dev/null 2>&1; then
            cargo install wasm-pack --locked
          fi

      - name: Build wasm playground bundle (size profile)
        working-directory: .
        run: ./scripts/build_wasm_website_bundle.sh

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and validate internal links
        run: pnpm build:check

      - name: Generate size baseline report
        run: pnpm report:size

      - name: Upload website size report artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-build-size-report
          path: website/perf/build_size_latest.json
          if-no-files-found: error
