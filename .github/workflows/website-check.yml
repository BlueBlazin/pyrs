name: website-check

on:
  pull_request:
    paths:
      - "website/**"
      - ".github/workflows/website-check.yml"
  push:
    branches:
      - master
    paths:
      - "website/**"
      - ".github/workflows/website-check.yml"

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and validate internal links
        run: pnpm build:check

      - name: Generate size baseline report
        run: pnpm report:size

      - name: Upload website size report artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-build-size-report
          path: website/perf/build_size_latest.json
          if-no-files-found: error
