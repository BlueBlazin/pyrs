name: website-pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - "website/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/build_wasm_website_bundle.sh"
      - ".github/workflows/website-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: website-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ASTRO_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (wasm32)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Download CPython 3.14.3 Lib
        run: |
          curl -fsSL -o /tmp/Python-3.14.3.tgz https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz
          tar -xzf /tmp/Python-3.14.3.tgz -C /tmp
          echo "PYRS_CPYTHON_LIB=/tmp/Python-3.14.3/Lib" >> "$GITHUB_ENV"

      - name: Install wasm-pack
        run: |
          if ! command -v wasm-pack >/dev/null 2>&1; then
            cargo install wasm-pack --locked
          fi

      - name: Build wasm playground bundle (size profile)
        run: ./scripts/build_wasm_website_bundle.sh

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install website dependencies
        run: pnpm --dir website install --frozen-lockfile

      - name: Configure Astro site and base path
        run: |
          owner="${GITHUB_REPOSITORY%/*}"
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [[ "$repo_name" == *.github.io ]]; then
            echo "ASTRO_SITE=https://${repo_name}" >> "$GITHUB_ENV"
            echo "ASTRO_BASE=/" >> "$GITHUB_ENV"
          else
            echo "ASTRO_SITE=https://${owner}.github.io" >> "$GITHUB_ENV"
            echo "ASTRO_BASE=/${repo_name}/" >> "$GITHUB_ENV"
          fi

      - name: Build and validate website
        run: pnpm --dir website build:check

      - name: Verify deploy root contains index.html
        run: test -f website/dist/index.html

      - name: Publish dist to gh-pages branch root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: website/dist
          force_orphan: true
          enable_jekyll: false
